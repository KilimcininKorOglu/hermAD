{{define "base"}}<!doctype html>
<html lang="{{.Lang}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{t .Lang "app.title"}}</title>
<link rel="stylesheet" href="/static/app.css">
<script src="/static/htmx.min.js" defer></script>
</head>
<body>
<header class="header">
  <a class="brand" href="/">hermAD</a>
  <nav class="nav">
    <a href="/" class="{{if eq .Active "dashboard"}}active{{end}}">{{t .Lang "nav.dashboard"}}</a>
    <a href="/dns" class="{{if eq .Active "dns"}}active{{end}}">{{t .Lang "nav.dns"}}</a>
    <a href="/admin" class="{{if eq .Active "admin"}}active{{end}}">{{t .Lang "nav.admin"}}</a>
    <span class="langs">{{range .Langs}}<a href="/lang/{{.}}" class="{{if eq $.Lang .}}active{{end}}">{{.}}</a>{{end}}</span>
    {{if .AuthOn}}<a href="/logout" class="danger">{{t .Lang "nav.logout"}}</a>{{end}}
  </nav>
</header>
<div id="toast" class="toast"></div>
<main class="container">{{template "content" .}}</main>
<footer class="footer">{{t .Lang "app.footer"}} · v{{.Version}}</footer>
</body>
</html>{{end}}
